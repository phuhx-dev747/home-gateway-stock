<div id="historyCard"
    class="sm:col-span-2 bg-[#111827] p-4 sm:p-6 rounded-2xl border border-gray-800/60 shadow-lg flex flex-col transition-all duration-300">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 border-b border-white/[0.06] pb-4">
        <div>
            <h2 class="text-xl font-bold text-gray-100">Gateway Telemetry History</h2>
            <p class="text-gray-400 text-xs mt-1">Unified history for CPU, RAM, and Temperature.</p>
        </div>
        <div class="flex items-center gap-1.5 bg-white/[0.03] p-1 rounded-xl border border-white/[0.08] self-stretch sm:self-auto justify-between">
            <button data-range="15m"
                class="range-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white border border-transparent">15m</button>
            <button data-range="30m"
                class="range-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white border border-transparent">30m</button>
            <button data-range="1h"
                class="range-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 shadow-[0_0_15px_rgba(99,102,241,0.15)]">1h</button>
            <button data-range="4h"
                class="range-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white border border-transparent">4h</button>
            <button data-range="24h"
                class="range-btn px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-gray-400 hover:text-white border border-transparent">24h</button>
        </div>
    </div>
    <div id="chartContainer" class="relative w-full h-[180px] sm:h-[250px] min-h-[180px] sm:min-h-[250px] transition-all duration-300">
        <div id="telemetryChart" class="w-full h-full"></div>
    </div>
</div>
